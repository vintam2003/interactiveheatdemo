<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heat Conduction Interactive Demo</title>
<style>
  :root{
    --navy:#0f1f5a;
    --blue:#2f4db3;
    --orange:#ee9b00;
    --bg:#f5f7fb;
    --panel:#ffffff;
    --muted:#5e6b85;
    --border:#d9dfeb;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:#18233f;
    background:linear-gradient(180deg,#edf2fb 0%, #f9fbff 100%);
  }
  .wrap{
    max-width:1280px;
    margin:0 auto;
    padding:0;
  }
  .hero{
    display:none;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    margin-bottom:0;
  }
  h1{
    margin:0;
    font-size:42px;
    color:var(--navy);
  }
  .subtitle{
    margin:8px 0 0;
    color:var(--muted);
    font-size:18px;
    max-width:820px;
    line-height:1.45;
  }
  .layout{
    display:grid;
    grid-template-columns:330px 1fr;
    gap:20px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:20px;
    box-shadow:0 10px 28px rgba(19,40,88,.08);
  }
  .controls{
    padding:20px;
  }
  .controls h2,
  .viewer h2{
    margin:0 0 16px;
    font-size:24px;
    color:var(--navy);
  }
  .group{margin-bottom:18px}
  label{
    display:block;
    font-weight:700;
    color:var(--navy);
    margin-bottom:8px;
  }
  select, input[type="range"]{
    width:100%;
  }
  select{
    padding:10px 12px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#fff;
    color:#162248;
    font-size:16px;
  }
  .rangeRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:8px;
  }
  .pill{
    min-width:82px;
    text-align:center;
    background:#eef3ff;
    color:var(--blue);
    border-radius:999px;
    padding:8px 12px;
    font-weight:700;
  }
  input[type="range"]{
    accent-color:var(--orange);
  }
  .quick{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
  }
  button{
    border:none;
    border-radius:12px;
    padding:11px 14px;
    cursor:pointer;
    font-weight:700;
    font-size:15px;
  }
  .primary{
    background:var(--blue);
    color:#fff;
  }
  .secondary{
    background:#eef3ff;
    color:var(--navy);
  }
  .legendNote{
    padding:14px 16px;
    background:#fff8e8;
    border:1px solid #f4ddb0;
    border-radius:14px;
    color:#614400;
    line-height:1.45;
    font-size:14px;
  }
  .viewer{
    padding:20px;
  }
  .viewerHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    margin-bottom:10px;
    flex-wrap:wrap;
  }
  .badge{
    background:#eef3ff;
    color:var(--blue);
    border-radius:999px;
    padding:8px 12px;
    font-weight:700;
    font-size:14px;
  }
  .canvasWrap{
    background:#fbfcff;
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px;
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
    background:#ffffff;
    border-radius:14px;
  }
  .insight{
    margin-top:14px;
    padding:16px;
    background:#f7f9fe;
    border:1px solid var(--border);
    border-radius:14px;
    line-height:1.5;
  }
  .insight strong{color:var(--navy)}
  .footer{
    margin-top:18px;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
  }
  @media (max-width: 980px){
    .layout{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="layout">
    <div class="panel controls">
      <h2>Controls</h2>

      <div class="group">
        <label for="modeSelect">View</label>
        <select id="modeSelect">
          <option value="heat">Heat Distribution (Contour-Style Map)</option>
          <option value="line">Temperature Profile (Line Plot)</option>
        </select>
      </div>

      <div class="group">
        <label for="paramSelect">Parameter</label>
        <select id="paramSelect">
          <option value="Q">Q/κ</option>
          <option value="beta">β/κ</option>
          <option value="T0">T₀</option>
          <option value="hL">h/L</option>
        </select>
      </div>

      <div class="group" id="profileGroup">
        <label for="profileSelect">Line Profile</label>
        <select id="profileSelect">
          <option value="horizontal">Horizontal midline: T(x, h/2)</option>
          <option value="vertical">Vertical midline: T(L/2, y)</option>
        </select>
      </div>

      <div class="group">
        <div class="rangeRow">
          <label for="paramSlider" style="margin-bottom:0">Slider Value</label>
          <div class="pill" id="sliderValue">1.29</div>
        </div>
        <input type="range" id="paramSlider" min="0.64" max="1.93" step="0.01" value="1.29" />
      </div>

      <div class="quick">
        <button class="secondary" id="lowBtn">Low</button>
        <button class="secondary" id="midBtn">Middle</button>
        <button class="secondary" id="highBtn">High</button>
        <button class="primary" id="resetBtn">Reset</button>
      </div>

      <div class="group" style="margin-top:18px">
        <div class="legendNote" id="noteBox">
          <strong>Q/κ:</strong> increasing this raises the overall temperature, especially near the centre of the domain.
        </div>
      </div>
    </div>

    <div class="panel viewer">
      <div class="viewerHeader">
        <h2 id="viewTitle">Heat Distribution</h2>
        <div class="badge" id="parameterBadge">Parameter: Q/κ</div>
      </div>

      <div class="canvasWrap">
        <canvas id="demoCanvas" width="860" height="540"></canvas>
      </div>

      <div class="insight" id="insightBox">
        <strong>Observation:</strong> As Q/κ increases, the coloured region becomes hotter overall while the basic shape of the field remains similar.
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('demoCanvas');
const ctx = canvas.getContext('2d');

const modeSelect = document.getElementById('modeSelect');
const paramSelect = document.getElementById('paramSelect');
const profileSelect = document.getElementById('profileSelect');
const profileGroup = document.getElementById('profileGroup');
const slider = document.getElementById('paramSlider');
const sliderValue = document.getElementById('sliderValue');
const parameterBadge = document.getElementById('parameterBadge');
const noteBox = document.getElementById('noteBox');
const insightBox = document.getElementById('insightBox');
const viewTitle = document.getElementById('viewTitle');

const lowBtn = document.getElementById('lowBtn');
const midBtn = document.getElementById('midBtn');
const highBtn = document.getElementById('highBtn');
const resetBtn = document.getElementById('resetBtn');

const domain = { L: 9, H: 8 };

const presets = {
  Q:   { min:0.64, mid:1.29, max:1.93, value:1.29, step:0.01, label:'Q/κ' },
  beta:{ min:0.57, mid:1.14, max:1.71, value:1.14, step:0.01, label:'β/κ' },
  T0:  { min:5.00, mid:10.00, max:15.00, value:10.00, step:0.01, label:'T₀' },
  hL:  { min:0.67, mid:0.89, max:1.11, value:0.89, step:0.01, label:'h/L' }
};

const state = {
  mode: 'heat',
  param: 'Q',
  profile: 'horizontal',
  values: {
    Q: 1.29,
    beta: 1.14,
    T0: 10.00,
    hL: 0.89
  }
};

const contourRanges = {
  Q: { min: 9.0, max: 49.5 },
  beta: { min: 10.0, max: 64.0 },
  T0: { min: 15.0, max: 51.0 },
  hL: { min: 10.0, max: 52.0 }
};

const lineRanges = {
  horizontal: {
    Q: { min: 10, max: 56 },
    beta: { min: 10, max: 68 },
    T0: { min: 5, max: 56 }
  },
  vertical: {
    Q: { min: 10, max: 72 },
    beta: { min: 10, max: 74 },
    T0: { min: 5, max: 66 }
  }
};

function getParamLabel(param){
  return presets[param].label;
}

function getCurrentHeight(){
  return domain.H;
}

function getLineTitle(){
  if(state.profile === 'horizontal'){
    return 'Variation of T_N with x at y = h/2';
  }
  return 'Variation of T_N with y at x = L/2';
}

function getLineYLabel(){
  if(state.profile === 'horizontal'){
    return 'T_N(x, h/2)';
  }
  return 'T_N(L/2, y)';
}

function getContourTitle(){
  return `Contour plot of T_N(x, y) for varying ${getParamLabel(state.param)}`;
}

function setSliderForParam(param){
  const p = presets[param];
  slider.min = p.min;
  slider.max = p.max;
  slider.step = p.step;
  slider.value = state.values[param];
  sliderValue.textContent = Number(state.values[param]).toFixed(2);
  parameterBadge.textContent = `Parameter: ${p.label}`;
}

function tempField(x, y){
  const xn = x / domain.L;
  const yn = y / domain.H;

  const Q = state.values.Q;
  const beta = state.values.beta;
  const T0 = state.values.T0;
  const hL = state.values.hL;

  const qScale = (Q - presets.Q.min) / (presets.Q.max - presets.Q.min);
  const betaScale = (beta - presets.beta.min) / (presets.beta.max - presets.beta.min);
  const hLScale = (hL - presets.hL.min) / (presets.hL.max - presets.hL.min);

  const archX = 4 * xn * (1 - xn);

  // gentler h/L effect
  const peakY = 0.50 - 0.08 * hLScale;
  const widthY = 0.30 + 0.05 * hLScale;

  const coreBulge = Math.exp(-Math.pow((yn - peakY) / widthY, 2));
  const lowerBulge = Math.exp(-Math.pow((yn - 0.20) / 0.22, 2));
  const riseTerm = yn * (1 - 0.45 * yn);

  const qAmp = 12.5 + 8.0 * qScale;
  const betaAmp = 14.0 + 18.0 * betaScale;

  // h/L changes curvature and vertical spread, but stays dome-like
  const hLCurve = 0.88 + 0.22 * hLScale;
  const hLLift = 0.92 + 0.18 * hLScale;

  const qTerm =
    qAmp * archX * hLCurve * (0.42 * riseTerm + 0.72 * coreBulge + 0.22 * lowerBulge);

  const betaTerm =
    betaAmp * archX * (0.32 * riseTerm + 0.62 * coreBulge);

  const baseline =
    hLLift * 1.2 * yn +
    (0.75 + 0.15 * hLScale) * Math.sin(Math.PI * yn) * archX;

  return T0 + baseline + qTerm + betaTerm;
}
function getTemperatureRange(){
  return contourRanges[state.param];
}

function tempToColor(t, minT, maxT){
  const ratio = (t - minT) / Math.max(1e-9, (maxT - minT));
  const hue = 250 - 200 * ratio;
  const sat = 90;
  const light = 34 + 28 * ratio;
  return `hsl(${hue}, ${sat}%, ${light}%)`;
}

function drawContourLines(x0, y0, plotW, plotH, minT, maxT){
  const nx = 70;
  const ny = 58;
  const vals = Array.from({length: ny + 1}, () => Array(nx + 1).fill(0));
  const currentH = getCurrentHeight();

  for(let j = 0; j <= ny; j++){
    const y = currentH * j / ny;
    for(let i = 0; i <= nx; i++){
      const x = domain.L * i / nx;
      vals[j][i] = tempField(x, y);
    }
  }

  const levels = [];
  const nLevels = 9;
  for(let k = 1; k <= nLevels; k++){
    levels.push(minT + (maxT - minT) * k / (nLevels + 1));
  }

  function interp(x1, y1, v1, x2, y2, v2, level){
    const denom = (v2 - v1);
    const t = Math.abs(denom) < 1e-9 ? 0.5 : (level - v1) / denom;
    return { x: x1 + t * (x2 - x1), y: y1 + t * (y2 - y1) };
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.32)';
  ctx.lineWidth = 1.15;

  for(const level of levels){
    for(let j = 0; j < ny; j++){
      for(let i = 0; i < nx; i++){
        const xL = x0 + plotW * i / nx;
        const xR = x0 + plotW * (i + 1) / nx;
        const yB = y0 - plotH * j / ny;
        const yT = y0 - plotH * (j + 1) / ny;

        const bl = vals[j][i];
        const br = vals[j][i + 1];
        const tr = vals[j + 1][i + 1];
        const tl = vals[j + 1][i];

        const pts = [];
        if((bl - level) * (br - level) < 0) pts.push(interp(xL, yB, bl, xR, yB, br, level));
        if((br - level) * (tr - level) < 0) pts.push(interp(xR, yB, br, xR, yT, tr, level));
        if((tr - level) * (tl - level) < 0) pts.push(interp(xR, yT, tr, xL, yT, tl, level));
        if((tl - level) * (bl - level) < 0) pts.push(interp(xL, yT, tl, xL, yB, bl, level));

        if(pts.length === 2){
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          ctx.lineTo(pts[1].x, pts[1].y);
          ctx.stroke();
        } else if(pts.length === 4){
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          ctx.lineTo(pts[1].x, pts[1].y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(pts[2].x, pts[2].y);
          ctx.lineTo(pts[3].x, pts[3].y);
          ctx.stroke();
        }
      }
    }
  }
}

function drawAxes(x0, y0, width, height, xLabel, yLabel){
  ctx.strokeStyle = '#22315d';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - height);
  ctx.lineTo(x0 + width, y0 - height);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + width, y0);
  ctx.stroke();

  ctx.fillStyle = '#22315d';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(xLabel, x0 + width / 2, y0 + 32);
  ctx.textAlign = 'start';

  ctx.save();
  ctx.translate(x0 - 38, y0 - height / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();
}

function drawTicks(x0, y0, width, height, xMax, yMax){
  ctx.fillStyle = '#425178';
  ctx.font = '13px Arial';
  ctx.strokeStyle = '#d9dfeb';
  ctx.lineWidth = 1;

  for(let i = 0; i <= 4; i++){
    const x = x0 + width * i / 4;
    const label = (xMax * i / 4).toFixed(0);
    ctx.beginPath();
    ctx.moveTo(x, y0);
    ctx.lineTo(x, y0 + 6);
    ctx.stroke();
    ctx.fillText(label, x - 6, y0 + 22);
  }

  for(let i = 0; i <= 4; i++){
    const y = y0 - height * i / 4;
    const label = (yMax * i / 4).toFixed(0);
    ctx.beginPath();
    ctx.moveTo(x0 - 6, y);
    ctx.lineTo(x0, y);
    ctx.stroke();
    ctx.fillText(label, x0 - 30, y + 4);
  }
}
function drawHeatMap(){
  const x0 = 82, y0 = 470, plotW = 560, plotH = 390;
  const range = getTemperatureRange();
  const min = range.min, max = range.max;
  const currentH = getCurrentHeight();

  ctx.fillStyle = '#fbfcff';
  ctx.fillRect(x0, y0 - plotH, plotW, plotH);

  const cols = 160, rows = 120;
  const dx = plotW / cols, dy = plotH / rows;

  for(let j = 0; j < rows; j++){
    const y = currentH * j / (rows - 1);
    for(let i = 0; i < cols; i++){
      const x = domain.L * i / (cols - 1);
      const t = tempField(x, y);
      ctx.fillStyle = tempToColor(t, min, max);
      const px = x0 + i * dx;
      const py = y0 - plotH + (rows - 1 - j) * dy;
      ctx.fillRect(px, py, dx + 1, dy + 1);
    }
  }

  drawContourLines(x0, y0, plotW, plotH, min, max);
  drawAxes(x0, y0, plotW, plotH, 'x', 'y');
  drawTicks(x0, y0, plotW, plotH, domain.L, currentH);

  const cbX = 690, cbY = 120, cbW = 36, cbH = 300;
  for(let i = 0; i < cbH; i++){
    const ratio = 1 - i / cbH;
    const t = min + ratio * (max - min);
    ctx.fillStyle = tempToColor(t, min, max);
    ctx.fillRect(cbX, cbY + i, cbW, 1.4);
  }
  ctx.strokeStyle = '#22315d';
  ctx.strokeRect(cbX, cbY, cbW, cbH);
  ctx.fillStyle = '#22315d';
  ctx.font = '16px Arial';
  ctx.fillText('Temperature', cbX - 22, cbY - 18);

  ctx.font = '13px Arial';
  for(let i = 0; i <= 4; i++){
    const y = cbY + cbH * i / 4;
    const value = (max - (max - min) * i / 4).toFixed(1);
    ctx.fillText(value, cbX + 48, y + 4);
    ctx.beginPath();
    ctx.moveTo(cbX + cbW, y);
    ctx.lineTo(cbX + cbW + 8, y);
    ctx.stroke();
  }

  ctx.fillStyle = '#0f1f5a';
  ctx.font = 'bold 24px Arial';
  ctx.fillText(getContourTitle(), 82, 48);
  ctx.font = '16px Arial';
  ctx.fillStyle = '#5e6b85';
  ctx.fillText(`Scale matched to the ${getParamLabel(state.param)} contour results.`, 82, 76);
}

function drawLinePlot(){
  const x0 = 82, y0 = 480, plotW = 610, plotH = 400;
  const samples = 220;
  let values = [];
  const xMax = state.profile === 'horizontal' ? domain.L : domain.H;

  for(let i = 0; i <= samples; i++){
    const s = xMax * i / samples;
    let t;
    if(state.profile === 'horizontal'){
      t = tempField(s, domain.H / 2);
    } else {
      t = tempField(domain.L / 2, s);
    }
    values.push({ s, t });
  }

  const baseRange = lineRanges[state.profile][state.param];
  const dataMin = Math.min(...values.map(v => v.t));
  const dataMax = Math.max(...values.map(v => v.t));
  const span = Math.max(1, dataMax - dataMin);
  const topPad = 0.10 * span;
  const bottomPad = 0.08 * span;

  const axisMin = Math.min(baseRange.min, dataMin - bottomPad);
  const axisMax = Math.max(baseRange.max, dataMax + topPad);

  function toPlotY(temp){
    const ratio = (temp - axisMin) / Math.max(1e-9, (axisMax - axisMin));
    return y0 - plotH * Math.min(1, Math.max(0, ratio));
  }

  ctx.fillStyle = '#fbfcff';
  ctx.fillRect(x0, y0 - plotH, plotW, plotH);

  ctx.strokeStyle = '#e2e8f4';
  ctx.lineWidth = 1;
  for(let i = 0; i <= 5; i++){
    const x = x0 + plotW * i / 5;
    ctx.beginPath();
    ctx.moveTo(x, y0);
    ctx.lineTo(x, y0 - plotH);
    ctx.stroke();
  }
  for(let i = 0; i <= 5; i++){
    const y = y0 - plotH * i / 5;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x0 + plotW, y);
    ctx.stroke();
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(x0, y0 - plotH, plotW, plotH);
  ctx.clip();

  ctx.strokeStyle = '#2f4db3';
  ctx.lineWidth = 3;
  ctx.beginPath();
  values.forEach((v, idx) => {
    const px = x0 + plotW * (v.s / xMax);
    const py = toPlotY(v.t);
    if(idx === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  });
  ctx.stroke();

  const markers = [0.2, 0.5, 0.8];
  ctx.fillStyle = '#ee9b00';
  markers.forEach(fr => {
    const idx = Math.floor(fr * samples);
    const v = values[idx];
    const px = x0 + plotW * (v.s / xMax);
    const py = toPlotY(v.t);
    ctx.beginPath();
    ctx.arc(px, py, 4.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();

  drawAxes(x0, y0, plotW, plotH, state.profile === 'horizontal' ? 'x' : 'y', getLineYLabel());

  ctx.fillStyle = '#425178';
  ctx.font = '13px Arial';
  for(let i = 0; i <= 4; i++){
    const x = x0 + plotW * i / 4;
    ctx.beginPath();
    ctx.moveTo(x, y0);
    ctx.lineTo(x, y0 + 6);
    ctx.strokeStyle = '#22315d';
    ctx.stroke();
    ctx.fillText((xMax * i / 4).toFixed(0), x - 4, y0 + 22);
  }
  for(let i = 0; i <= 4; i++){
    const y = y0 - plotH * i / 4;
    const label = (axisMin + (axisMax - axisMin) * i / 4).toFixed(0);
    ctx.beginPath();
    ctx.moveTo(x0 - 6, y);
    ctx.lineTo(x0, y);
    ctx.stroke();
    ctx.fillText(label, x0 - 34, y + 4);
  }

  ctx.fillStyle = '#0f1f5a';
  ctx.font = 'bold 24px Arial';
  ctx.fillText(getLineTitle(), 82, 48);
  ctx.font = '16px Arial';
  ctx.fillStyle = '#5e6b85';
  const profileText = `Scale matched to the ${getParamLabel(state.param)} line-plot results.`;
  ctx.fillText(profileText, 82, 76);

  ctx.fillStyle = '#2f4db3';
  ctx.fillRect(720, 132, 30, 3);
  ctx.fillStyle = '#22315d';
  ctx.font = '15px Arial';
  ctx.fillText(`${getParamLabel(state.param)} selected`, 760, 138);
}

function updateText(){
  if(state.mode === 'line' && state.param === 'hL'){
    state.param = 'Q';
    paramSelect.value = 'Q';
    setSliderForParam('Q');
  }

  const p = state.param;
  const label = presets[p].label;

  const notes = {
    Q: '<strong>Q/κ:</strong> increasing this raises the overall temperature, especially near the centre of the domain.',
    beta: '<strong>β/κ:</strong> increasing this strengthens the boundary-driven effect and produces steeper gradients.',
    T0: '<strong>T₀:</strong> increasing this shifts the temperature field upward without changing the overall shape very much.',
    hL: '<strong>h/L:</strong> changing this alters the domain proportion, which changes the shape and spread of the contour field.'
  };

  const heatInsights = {
    Q: '<strong>Observation:</strong> As Q/κ increases, the coloured region becomes hotter overall while the basic pattern remains similar.',
    beta: '<strong>Observation:</strong> As β/κ increases, the distribution becomes steeper near the boundary, so the gradient is more pronounced.',
    T0: '<strong>Observation:</strong> As T₀ increases, the whole temperature field shifts upward uniformly, with little change in the general shape.',
    hL: '<strong>Observation:</strong> As h/L changes, the contour field becomes taller or flatter, changing the overall shape of the temperature distribution.'
  };

  const lineInsights = {
    Q: '<strong>Observation:</strong> Increasing Q/κ raises the profile, especially near the middle where the temperature is highest.',
    beta: '<strong>Observation:</strong> Increasing β/κ changes the steepness and curvature of the profile, showing a stronger boundary effect.',
    T0: '<strong>Observation:</strong> Increasing T₀ shifts the entire curve upward without greatly changing its shape.'
  };

  noteBox.innerHTML = notes[p];
  insightBox.innerHTML = state.mode === 'heat' ? heatInsights[p] : lineInsights[p];
  parameterBadge.textContent = `Parameter: ${label}`;
  viewTitle.textContent = state.mode === 'heat' ? 'Contour Plot' : 'Line Plot';
  profileGroup.style.display = state.mode === 'line' ? 'block' : 'none';
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  updateText();
  if(state.mode === 'heat'){
    drawHeatMap();
  } else {
    drawLinePlot();
  }
}

function updateParamValue(v){
  state.values[state.param] = Number(v);
  sliderValue.textContent = Number(v).toFixed(2);
  draw();
}

modeSelect.addEventListener('change', e => {
  state.mode = e.target.value;

  if(state.mode === 'line' && state.param === 'hL'){
    state.param = 'Q';
    paramSelect.value = 'Q';
    setSliderForParam('Q');
  }

  draw();
});

paramSelect.addEventListener('change', e => {
  state.param = e.target.value;

  if(state.mode === 'line' && state.param === 'hL'){
    state.param = 'Q';
    paramSelect.value = 'Q';
  }

  setSliderForParam(state.param);
  draw();
});

profileSelect.addEventListener('change', e => {
  state.profile = e.target.value;
  draw();
});

slider.addEventListener('input', e => {
  updateParamValue(e.target.value);
});

lowBtn.addEventListener('click', () => {
  const p = presets[state.param];
  state.values[state.param] = p.min;
  setSliderForParam(state.param);
  draw();
});

midBtn.addEventListener('click', () => {
  const p = presets[state.param];
  state.values[state.param] = p.mid;
  setSliderForParam(state.param);
  draw();
});

highBtn.addEventListener('click', () => {
  const p = presets[state.param];
  state.values[state.param] = p.max;
  setSliderForParam(state.param);
  draw();
});

resetBtn.addEventListener('click', () => {
  state.mode = 'heat';
  state.param = 'Q';
  state.profile = 'horizontal';
  state.values.Q = presets.Q.mid;
  state.values.beta = presets.beta.mid;
  state.values.T0 = presets.T0.mid;
  state.values.hL = presets.hL.mid;
  modeSelect.value = state.mode;
  paramSelect.value = state.param;
  profileSelect.value = state.profile;
  setSliderForParam(state.param);
  draw();
});

setSliderForParam(state.param);
draw();
</script>
</body>
</html>
